substitutions:
  devicename: avatto_s06_living_room
  nodename: avatto-s06-living-room
  telegram_api_token: !secret telegram_api
  telegram_chat_id: !secret telegram_enzokot_chat_id
  pikvm_api_main_authorization: !secret pikvm_api_main_authorization
  pikvm_hostname_main: !secret pikvm_hostname_main
  telegram_api_host: !secret telegram_api_host

#external_components:
#  - source: github://TheStaticTurtle/esphome_syslog
#    components: [syslog]

esphome:
  name: $nodename
  comment: IR and notify telegram HA state living room

esp8266:
  board: esp_wroom_02
  
wifi:
  fast_connect: true
  min_auth_mode: WPA2
  networks:
  #Точка в спальне
#  - ssid: Kotletochka
#    password: !secret wifi_password
#    bssid: "50:ff:20:c5:72:2d"
#    priority: 1

  #Точка на кухне
#  - ssid: Kotletochka
#    password: !secret wifi_password
#    bssid: "50:ff:20:c5:8a:b1"
#    priority: 1

  #Основная точка
  - ssid: Kotletochka
    password: !secret wifi_password
    bssid: "50:ff:20:9e:1d:1e"
    priority: 2
  
#  - ssid: Kotletochka_Yi
#    password: !secret wifi_password
#    hidden: true
#    priority: 1
    
#  - ssid: Kotletochka_kit
#    password: !secret wifi_password
#    hidden: true
#    priority: 1

  ap:
    ssid: "${nodename}"
    password: !secret wifi_password

  on_connect:
    - script.execute: wol_main_server_script

captive_portal:

http_request:
  verify_ssl: false

udp:
  id: kotletochka_ds_udp
  addresses: !secret kotletochka-ds-lan-ip

logger:
  #baud_rate: 0

debug:
  update_interval: 5s

syslog:
  #ip_address: "kotletochka-ds.lan"
  udp_id: kotletochka_ds_udp
  time_id: sntp_time
  level: 'INFO'
    
api:
  reboot_timeout: 0s
  services:
    - service: send_samsung_command
      variables:
        data: string
      then:
        - remote_transmitter.transmit_samsung:
            data: !lambda 'return strtoul(data.c_str(), nullptr, 16);'
    - service: send_lg_command
      variables:
        data: string
        nbits: int
      then:
        - remote_transmitter.transmit_lg:
            data: !lambda 'return strtoul(data.c_str(), nullptr, 16);'
            nbits: !lambda 'return nbits;'
    - service: send_raw_command
      variables:
        data: int[]
      then:
        - remote_transmitter.transmit_raw:
            code: !lambda 'return {data.begin(), data.end()};'
#            code: !lambda 'return data;'

ota:
  - platform: esphome
    password: !secret ota_password

time:
  - platform: sntp
    id: sntp_time
    servers: 
      - 192.168.217.30
      - ntp2.vniiftri.ru
      - pool.ntp.org
    timezone: Europe/Moscow

# Веб сервер
#web_server:
#  port: 80
#  version: 3
#  include_internal: true

status_led:
  pin: GPIO4

remote_receiver:
  pin: 
    number: GPIO5
    mode: INPUT_PULLUP
    inverted: true
  dump: all
  tolerance: 55%
  id: receiver_s06_living_room

remote_transmitter:
  pin: 
    number: GPIO14
    inverted: false
  carrier_duty_percent: 50%
  id: transmitter_s06_living_room

script:
  - id: wol_main_server_script
    mode: restart
    then:
      - if:
          condition:
            binary_sensor.is_off: status_connection
          then:
            - logger.log: 
                format: "Start main WOL script"
                level: INFO
            - delay: 2min
            - if:
                condition:
                  text_sensor.state:
                    id: debug_reset_reason
                    state: 'Power On'
                then:
                  - logger.log: 
                      format: "Press main WOL button"
                      level: INFO
                  - button.press: button_wol_main_server
                  - wait_until:
                      condition:
                        binary_sensor.is_on: status_connection
                      timeout: 2min
                  - if:
                      condition:
                        binary_sensor.is_on: status_connection
                      then:
                        - logger.log: 
                            format: "API connected check passed"
                            level: INFO
                      else:
                        - logger.log: 
                            format: "API connected check failed"
                            level: INFO
                        - http_request.post:
                            url: "http://${pikvm_hostname_main}/api/gpio/pulse?channel=restart_ac_prox_main"
                            request_headers:
                              Content-Type: application/json
                              Authorization: "Basic ${pikvm_api_main_authorization}"

binary_sensor:
  - platform: gpio
    pin:
      number: GPIO13
      inverted: true
    internal: true
    name: "${devicename}_Button"
    id: button_s06_living_room
    on_double_click:
      then:
        - button.press: button_restart_safe_mode

  - platform: status
    name: "${devicename}_Status"
    id: status_connection
    internal: true
    on_state:
          then:
            - if:
                condition:
                    - binary_sensor.is_on: "status_connection"
                    - lambda: 'return id(uptime_sec).state > 60;'
                then:
                  - http_request.post:
                      url: "${telegram_api_host}/bot${telegram_api_token}/sendMessage"                      
                      request_headers:
                        Content-Type: application/json
                      json:
                        chat_id: "${telegram_chat_id}"
                        parse_mode: "HTML"
                        text: "\U00002705 <b>Трекинг устройств</b>\n${nodename}: Home Assistant доступен"

            - if:
                condition:
                    - binary_sensor.is_off: "status_connection"
                    - lambda: 'return id(uptime_sec).state > 60;'
                then:
                  - http_request.post:
                      url: "${telegram_api_host}/bot${telegram_api_token}/sendMessage"                      
                      request_headers:
                        Content-Type: application/json
                      json:
                        chat_id: "${telegram_chat_id}"
                        parse_mode: "HTML"
                        text: "\U000026d4 <b>Трекинг устройств</b>\n${nodename}: Home Assistant <b>недоступен</b>"
    
climate:
  - platform: fujitsu_general
    name: "Avatto living room AC"
    sensor: temp_for_avatto_ac_living_room
    visual:
          min_temperature: 18 °C    
    receiver_id: receiver_s06_living_room
    
sensor:
  - platform: homeassistant
    name: "Temperature living room"
    internal: true
    device_class: temperature    
    entity_id: sensor.esp_xiaomi_living_room_temperature
    id: temp_for_avatto_ac_living_room
    filters:
      - round: 1

  - platform: uptime
    name: "${devicename}_Uptime_Sensor"
    id: uptime_sec
    update_interval: 15s

  - platform: wifi_signal
    name: "${devicename}_WiFi_RSSI"
    update_interval: 60s

text_sensor:
  - platform: wifi_info
    ssid:
      name: "${devicename}_Connected_SSID"
    bssid:
      name: "${devicename}_Connected_BSSID" 

  - platform: debug
    reset_reason:
      name: "${devicename}_Reset_reason"
      id: debug_reset_reason
      internal: true

button:
  - platform: restart
    name: ${devicename}_Restart
    id: button_restart

  - platform: safe_mode
    name: ${devicename}_Safe_Mode
    id: button_restart_safe_mode

  - platform: wake_on_lan
    name: ${devicename}_WOL_Main_Server
    id: button_wol_main_server
    internal: true
    target_mac_address: !secret mac_main_server_upper

