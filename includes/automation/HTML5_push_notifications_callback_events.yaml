
#Установка обновления по кнопке из уведомления HTML5 push по обновлению
    - alias: install update html5 push notifications
      id: install update html5 push notifications
      initial_state: true
      mode: parallel
      triggers:
        - trigger: event
          event_type: html5_notification.clicked
          event_data:
            action: install_update
      conditions:
        - "{{ trigger.event.data['data']['update_entity'] is defined }}"
      actions:
        - variables:
            entity: "{{- trigger.event.data['data']['update_entity'] | replace('update_available_notify_', 'update.') -}}"
            backup_before: "{{ '{:0=64b}'.format(state_attr(entity, 'supported_features'))[-4] == '1' }}"
        - condition: "{{ not backup_before or is_state('sensor.backup_backup_manager_state', 'idle') }}"
        - if:
            - "{{ is_state(entity, 'on') and is_state_attr(entity, 'in_progress', false) }}"
          then:
            - action: update.install
              target:
                entity_id: "{{- entity -}}"
              data:
                backup: "{{ backup_before }}"
