    - alias: yeelight ceiling cr on ambilight night mode
      id: yeelight ceiling cr on ambilight night mode
      initial_state: true
      max_exceeded: silent
      triggers:
        - trigger: state
          entity_id: sensor.0x158d0003a360b6_action
          to: 'single'
      conditions:
          - condition: state
            entity_id: light.yeelight_ceiling_cr
            state: "off"
      actions:
          - action: light.turn_on
            target:
                entity_id: light.yeelight_ceiling_cr_ambilight
            data:
                brightness: 1
                rgb_color: [0, 0, 255]
                #rgb_color: [255, 167, 88]

    - alias: yeelight ceiling cr off ambilight night mode
      id: yeelight ceiling cr off ambilight night mode
      initial_state: true
      max_exceeded: silent
      triggers:
        - trigger: state
          entity_id: sensor.0x158d0003a360b6_action
          to: 'single'
      conditions:
          - condition: state
            entity_id: light.yeelight_ceiling_cr_ambilight
            state: "on"
          - condition: state
            entity_id: light.yeelight_ceiling_cr
            state: "off"
      actions:
          - action: light.turn_off
            target:
                entity_id: light.yeelight_ceiling_cr_ambilight

#Синхронизация светильника и выключателя каждые 3 минуты
    - alias: sync yeelight ceiling cr to switch
      id: sync yeelight ceiling cr to switch
      initial_state: true
      triggers:
        - trigger: time_pattern
          minutes: "/3"
      conditions:
          - "{{ (state_attr('automation.yeelight_ceiling_on', 'current') | int(0)) == 0 }}"
          - "{{ (state_attr('automation.yeelight_ceiling_off', 'current') | int(0)) == 0 }}"
          - condition: or
            conditions:
              - condition: and
                conditions:
                  - condition: state
                    entity_id: binary_sensor.0x158d0003f37a0f_contact
                    state: 'on'
                  - condition: state
                    entity_id: light.yeelight_ceiling_cr
                    state: 'off'
                  - condition: state
                    entity_id: light.yeelight_ceiling_cr_ambilight
                    state: 'off'
                  - condition: state
                    entity_id: light.yeelight_ceiling_cr_nightlight
                    state: 'off'
              - condition: and
                conditions:
                  - condition: state
                    entity_id: binary_sensor.0x158d0003f37a0f_contact
                    state: 'off'
                  - condition: state
                    entity_id: light.yeelight_ceiling_cr
                    state: 'on'
      actions:
        - action: telegram_bot.send_message
          data:
            config_entry_id: '{{ config_entry_id("notify.telegram_enzokot_to_bot") }}'
            target: !secret telegram_enzokot_chat_id
            message: >-
                       ⚠️ Обнаружено отклонение светильника и выключателя, исправить?
            inline_keyboard:
              - 'Да:/changelight, Нет:/nochangelight, Игнорировать:/ignoringchangelight'
        - action: automation.turn_off
          target:
            entity_id: "{{ this.entity_id }}"

#Подсветка шлюза при открытии входной двери
    - alias: light gateway toggle
      id: light gateway toggle
      initial_state: true
      max_exceeded: silent
      triggers:
         - trigger: state
           entity_id: binary_sensor.0x158d000359304c_contact
           from: 'off'
           to: 'on'
      conditions:
        - condition: state
          entity_id: automation.turn_on_doorbell
          attribute: current
          state: 0
        - condition: state
          entity_id: input_boolean.alarm_gateway_button
          state: 'off'
      actions:
        - action: scene.create
          data:
            scene_id: before_light_door_open
            snapshot_entities:
              - light.gateway_light_04cf8cabd77b
        - action: light.turn_on
          target:
            entity_id: light.gateway_light_04cf8cabd77b
          data:
            rgb_color: [255,0,0]
            brightness: 255
        - delay:
            milliseconds: 150
        - action: light.turn_off
          target:
            entity_id: light.gateway_light_04cf8cabd77b
        - delay:
            milliseconds: 50
        - action: light.turn_on
          target:
            entity_id: light.gateway_light_04cf8cabd77b
          data:
            rgb_color: [255,0,0]
            brightness: 255
        - delay:
            milliseconds: 150
        - action: light.turn_off
          target:
            entity_id: light.gateway_light_04cf8cabd77b
        - action: scene.turn_on
          target:
            entity_id: scene.before_light_door_open

#Подсветка шлюза утром
    - alias: light gateway go to work on
      id: light gateway go to work on
      triggers:
        - trigger: time
          at: "07:00:00"
      conditions:
        - condition: state
          entity_id: input_boolean.alarm_gateway_button
          state: 'off'
        - condition: time
          weekday:
            - mon
            - tue
            - wed
            - thu
            - fri
      actions:
        - action: scene.create
          data:
            scene_id: before_on_go_to_work
            snapshot_entities:
              - light.gateway_light_04cf8cabd77b
        - action: light.turn_on
          target:
            entity_id: light.gateway_light_04cf8cabd77b
          data:
            rgb_color: [230,255,0]
            brightness: 5

    - alias: light gateway go to work off
      id: light gateway go to work off
      triggers:
        - trigger: time
          at: "07:20:00"
      conditions:
        - condition: state
          entity_id: input_boolean.alarm_gateway_button
          state: 'off'
        - condition: time
          weekday:
            - mon
            - tue
            - wed
            - thu
            - fri
      actions:
        - action: light.turn_off
          target:
            entity_id: light.gateway_light_04cf8cabd77b
        - action: scene.turn_on
          target:
            entity_id: scene.before_on_go_to_work

#Перезапуск интеграции и реле для yeelight ceiling детская
    - alias: restart integration relay yeelight ceiling unavailable
      id: restart integration relay yeelight ceiling unavailable
      initial_state: true
      max_exceeded: silent
      triggers:
        - trigger: state
          entity_id: light.yeelight_ceiling_cr
          to:
        - trigger: homeassistant
          event: start
      conditions:
        - condition: state
          entity_id: input_boolean.instances_stoping
          state: 'off'
        - "{{ state_attr(this.entity_id, 'last_triggered') is none or now() - state_attr(this.entity_id, 'last_triggered') > timedelta(seconds = 60) }}"
        - "{{ not has_value('light.yeelight_ceiling_cr') }}"
        - "{{ has_value('switch.0x54ef441000096cbc') }}"
      actions:
        - wait_template: "{{ has_value('light.yeelight_ceiling_cr') or is_state('input_boolean.instances_stoping', 'on') }}"
          timeout: "00:02:00"
        - choose:
            - conditions: "{{ not wait.completed and is_state('binary_sensor.local_network_availability', 'on') }}"
              sequence:
                  - action: switch.turn_off
                    target:
                      entity_id: switch.0x54ef441000096cbc
                  - delay:
                      seconds: 5
                  - action: switch.turn_on
                    target:
                      entity_id: switch.0x54ef441000096cbc
                  - delay:
                      seconds: 30
                  - action: homeassistant.reload_config_entry
                    data:
                      entry_id: "{{ config_entry_id('light.yeelight_ceiling_cr') }}"

#Включение подсветки зеркала в туалете по датчику присутствия и освещенности
    - alias: occupancy turn on mirror lighting wc
      id: occupancy turn on mirror lighting wc
      initial_state: true
      max_exceeded: silent
      triggers:
        - trigger: state
          entity_id: 'binary_sensor.c09b9eb4599a_occupancy'
          to: 'on'
      conditions:
        - condition: numeric_state
          entity_id: 'sensor.c09b9eb4599a_illuminance'
          below: 50
        - condition: state
          entity_id: 'switch.0x086bd7fffe5b7c7f_right'
          state: 'off'
        - condition: state
          entity_id: 'timer.delayed_turn_off_mirror_lighting_wc'
          state: 'idle'
      actions:
        - parallel:
            - action: switch.turn_on
              target:
                entity_id: 'switch.0x086bd7fffe5b7c7f_right'
            - action: timer.start
              target:
                entity_id: 'timer.delayed_turn_off_mirror_lighting_wc'

#Выключение подсветки зеркала в туалете по таймеру датчика присутствия и освещенности
    - alias: timer turn off mirror lighting wc
      id: timer turn off mirror lighting wc
      initial_state: true
      max_exceeded: silent
      triggers:
        - trigger: event
          event_type: timer.finished
          event_data:
            entity_id: 'timer.delayed_turn_off_mirror_lighting_wc'
      conditions:
        - condition: state
          entity_id: 'switch.0x086bd7fffe5b7c7f_right'
          state: 'on'
      actions:
        - choose:
            - conditions:
                - condition: state
                  entity_id: 'binary_sensor.c09b9eb4599a_occupancy'
                  state: 'on'
              sequence:
                - action: timer.start
                  target:
                    entity_id: 'timer.delayed_turn_off_mirror_lighting_wc'
          default:
            - action: switch.turn_off
              target:
                entity_id: 'switch.0x086bd7fffe5b7c7f_right'

