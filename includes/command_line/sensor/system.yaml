#Сенсоры ошибок и предупрежений в логах НА
  - sensor:
      name: errors in system log command line
      command: 'curl -Ls -H "Authorization: Bearer $SUPERVISOR_TOKEN" -X GET http://supervisor/core/logs/latest | sed -r "s/\x1B\[([0-9]{1,3}(;[0-9]{1,2};?)?)?[mGK]//g" | grep -v "We found a custom integration " | grep -c -E "^[0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2}:[0-9]{2}[.][0-9]{3} ERROR .*$" || true'
      scan_interval: 600
      unit_of_measurement: ea
    
  - sensor:
      name: warnings in system log command line
      command: 'curl -Ls -H "Authorization: Bearer $SUPERVISOR_TOKEN" -X GET http://supervisor/core/logs/latest | sed -r "s/\x1B\[([0-9]{1,3}(;[0-9]{1,2};?)?)?[mGK]//g" | grep -v "We found a custom integration " | grep -c -E "^[0-9]{4}-[0-9]{2}-[0-9]{2} [0-9]{2}:[0-9]{2}:[0-9]{2}[.][0-9]{3} WARNING .*$" || true'
      scan_interval: 600
      unit_of_measurement: ea

#Доступность Telegram API
  - sensor:
      name: telegram status
      command: "curl --silent --fail -m 5 -o /dev/null -G https://api.telegram.org/bot{{ states('input_text.var_telegram_bot_api_token') }}/getMe && echo online || echo offline"
