#Виртуализация toggle для UI
    toggle_climate_from_ui:
        alias: Вкл/выкл сущностей climate
        icon: mdi:home-thermometer
        mode: parallel
        fields:
          entityid:
            description: 'Имя сущности climate'
            example: 'climate.devireg_hw'
        sequence:
          - action: "climate.{{- iif(is_state(entityid, 'off'), 'turn_on', 'turn_off') }}"
            target:
              entity_id: "{{ entityid }}"

#Переключение режимов вентилятора для UI
    switch_fan_preset_mode:
        alias: Смена режима вентилятора
        icon: mdi:fan-auto
        mode: parallel
        fields:
          entityid:
            description: 'Имя сущности fan'
            example: 'fan.dmaker_p45_5007_fan'
        sequence:
          - condition: "{{ is_state(entityid, 'on') }}"
          - action: fan.set_preset_mode
            target:
              entity_id: "{{ entityid }}"
            data:
              preset_mode: >-
                {%
                  set preset_mode_dict = {"Straight Wind": "Natural Wind",
                                          "Natural Wind": "Sleep",
                                          "Sleep": "Straight Wind"}
                %}
                {{ preset_mode_dict[state_attr(entityid, 'preset_mode')] }}

#Установка локальной температуры термостатов
    auto_set_local_temperature_to_thermostats:
        alias: Автоматическая установка локальной температуры термостату
        icon: mdi:hydraulic-oil-temperature
        mode: parallel
        fields:
          objecttemperatureinput:
            description: 'Имя объекта number для установки температуры комнаты термостата'
            example: 'number.0x0cae5ffffebbda1d_external_temperature_input'
          objectsensortemperature:
            description: 'Имя объекта внешнего датчика температуры'
            example: 'sensor.esp_xiaomi_bed_room_temperature'
        sequence:
        - condition: "{{ has_value(objectsensortemperature) and has_value(objecttemperatureinput) }}"
        - action: number.set_value
          target:
            entity_id: "{{ objecttemperatureinput }}"
          data:
            value: "{{ states(objectsensortemperature) | round(1, 0) }}"
